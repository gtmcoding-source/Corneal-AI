<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Plan - Corneal AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="app-shell" data-toast="Study plan ready.">
    <div class="workspace-shell">
        {% include "partials/app_sidebar.html" %}
        <main class="workspace-main">
            <header class="workspace-topbar">
                <div>
                    <p class="eyebrow">Study Planner</p>
                    <h1>{{ subject }} Plan</h1>
                    <p class="subtitle">Target exam: {{ exam_date }} | Difficulty: {{ difficulty }} | {{ available_hours }}h/day</p>
                </div>
                <div class="quick-actions">
                    <a class="link-pill" href="{{ url_for('home') }}#study-planner">Create Another Plan</a>
                    <a class="link-pill link-pill-primary" href="{{ url_for('download_note', note_id=note_id) }}">Download PDF</a>
                </div>
            </header>

            <section class="panel notes-display premium-card">
                <article class="note-content note-collapsible">
                    {{ plan_html | safe }}
                </article>
            </section>
        </main>
    </div>
    <div id="toast" class="toast"></div>
    <a class="sticky-pdf-btn" href="{{ url_for('download_note', note_id=note_id) }}">Generate PDF</a>
    <script src="{{ url_for('static', filename='js/ui.js') }}" defer></script>
</body>
</html>
