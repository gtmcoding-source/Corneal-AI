<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - AI Notes</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-shell">
    <div class="bg-orb orb-b"></div>
    <div class="bg-orb orb-c"></div>
    <main class="auth-wrap">
        <section class="auth-container panel">
            <p class="eyebrow">Create Account</p>
            <h2>Register with username, email, or mobile</h2>
            {% if error %}
                <p class="error-message">{{ error }}</p>
            {% endif %}
            <form class="auth-form" action="{{ url_for('register') }}" method="POST">
                <input type="text" name="username" placeholder="Username">
                <input type="email" name="email" placeholder="Email (optional)">
                <input type="tel" name="mobile" placeholder="Mobile (optional)">
                <input type="password" name="password" placeholder="Password" required>
                <button type="submit">Register</button>
            </form>
            <p class="auth-switch">Already have an account? <a href="{{ url_for('login') }}">Login here</a></p>
        </section>

        <section class="bottom-ad-wrap" aria-label="Bottom advertisement slot">
            <div class="bottom-ad-slot">Sponsored Placement</div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="site-footer-inner">
            <p>AI Notes Maker</p>
            <p>Register</p>
            <p>Privacy</p>
            <p>Terms</p>
            <p>Contact</p>
        </div>
    </footer>
</body>
</html>
