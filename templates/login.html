<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AI Notes</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-shell">
    <div class="bg-orb orb-a"></div>
    <div class="bg-orb orb-c"></div>
    <main class="auth-wrap">
        <section class="auth-container panel">
            <p class="eyebrow">Welcome Back</p>
            <h2>Log in with username, email, or mobile</h2>
            {% if error %}
                <p class="error-message">{{ error }}</p>
            {% endif %}

            <div class="oauth-row">
                <a class="oauth-btn" href="{{ url_for('auth0_login') }}">Continue with Auth0</a>
            </div>

            <form class="auth-form" action="{{ url_for('login') }}" method="POST">
                <input type="text" name="identifier" placeholder="Username / Email / Mobile" required>
                <input type="password" name="password" placeholder="Password" required>
                <button type="submit">Login</button>
            </form>

            <p class="auth-switch">Don't have an account? <a href="{{ url_for('register') }}">Register here</a></p>
        </section>

        <section class="bottom-ad-wrap" aria-label="Bottom advertisement slot">
            <div class="bottom-ad-slot">Sponsored Placement</div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="site-footer-inner">
            <p>AI Notes Maker</p>
            <p>Login</p>
            <p>Security</p>
            <p>Terms</p>
            <p>Contact</p>
        </div>
    </footer>
</body>
</html>
