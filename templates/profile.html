<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - AI Notes Maker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="app-shell">
    <div class="bg-orb orb-a"></div>
    <div class="bg-orb orb-b"></div>
    <nav class="topbar">
        <h1 class="brand">Profile</h1>
        <div class="top-actions">
            <a class="link-pill" href="{{ url_for('dashboard') }}">Dashboard</a>
            <a class="link-pill" href="{{ url_for('home') }}">Generate</a>
            <a class="link-pill" href="{{ url_for('logout') }}">Logout</a>
        </div>
    </nav>
    <main class="container">
        <section class="panel landing-card">
            <h2>Account Details</h2>
            <ul class="landing-list">
                <li><strong>Username:</strong> {{ user.username }}</li>
                <li><strong>Email:</strong> {{ user.email or 'Not set' }}</li>
                <li><strong>Mobile:</strong> {{ user.mobile or 'Not set' }}</li>
            </ul>
        </section>
    </main>

    <footer class="site-footer">
        <div class="site-footer-inner">
            <p>AI Notes Maker</p>
            <p>Profile</p>
            <p>Settings</p>
            <p>Privacy</p>
            <p>Contact</p>
        </div>
    </footer>
</body>
</html>
